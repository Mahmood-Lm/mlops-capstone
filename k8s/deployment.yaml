apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentiment-api-deployment
spec:
  replicas: 3 # We want 3 identical copies of the AI model!
  selector:
    matchLabels:
      app: sentiment-api
  template:
    metadata:
      labels:
        app: sentiment-api
    spec:
      containers:
      - name: sentiment-api
        # Tell Kubernetes exactly which image to pull from Docker Hub
        image: mahmooood/sentiment-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000

---
apiVersion: v1
kind: Service
metadata:
  name: sentiment-api-service
spec:
  type: NodePort
  selector:
    app: sentiment-api
  ports:
    - protocol: TCP
      port: 8000        # The port inside the cluster
      targetPort: 8000  # The port your Python app listens on
      nodePort: 30000   # The public port we will use to access the API!